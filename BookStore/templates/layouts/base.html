{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BookStore{% endblock %}</title>
    <style>
        :root {
            --page-bg: #f5efe6;
            --surface: #fffaf3;
            --surface-strong: #ffffff;
            --text-main: #2f241f;
            --text-soft: #6c5950;
            --accent: #9a3412;
            --accent-dark: #7c2d12;
            --line: #e8d8c8;
            --shadow: 0 18px 40px rgba(74, 47, 34, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(201, 115, 39, 0.14), transparent 30%),
                linear-gradient(180deg, #fcf8f2 0%, var(--page-bg) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .site-shell {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(12px);
            background: rgba(252, 248, 242, 0.88);
            border-bottom: 1px solid rgba(154, 52, 18, 0.12);
        }

        .header-inner,
        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 18px 0;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .brand-mark {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--accent), #d97706);
            color: white;
            box-shadow: var(--shadow);
        }

        .site-nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .site-nav a {
            padding: 10px 14px;
            border-radius: 999px;
            color: var(--text-soft);
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .site-nav a:hover {
            background: rgba(154, 52, 18, 0.08);
            color: var(--accent-dark);
        }

        main {
            flex: 1;
            padding: 40px 0 56px;
        }

        .site-footer {
            border-top: 1px solid rgba(154, 52, 18, 0.12);
            background: rgba(255, 250, 243, 0.92);
        }

        .footer-note {
            color: var(--text-soft);
            font-size: 0.95rem;
        }

        .footer-links {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-soft);
        }

        .footer-links a:hover {
            color: var(--accent-dark);
        }

        @media (max-width: 700px) {
            .header-inner,
            .footer-inner {
                flex-direction: column;
                align-items: flex-start;
            }

            .site-shell {
                width: min(100% - 20px, 1120px);
            }

            main {
                padding-top: 28px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include "layouts/header.html" %}
    <main class="site-shell">
        {% block content %}{% endblock %}
    </main>
    {% include "layouts/footer.html" %}
</body>
</html>
